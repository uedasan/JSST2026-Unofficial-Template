name: Build and Publish Template PDF

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: template-pdf-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile template PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: JSST2026_Template.tex
          latexmk_use_lualatex: false
          latexmk_shell_escape: false
          latexmk_rc_files: latexmkrc
          extra_system_packages: fontconfig
          work_in_root_file_dir: true

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: JSST2026_Template_pdf
          path: JSST2026_Template.pdf

      - name: Publish PDF to GitHub Release
        if: github.event_name != 'pull_request' && github.ref_name == 'main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: template-pdf-latest
          name: Latest Template PDF
          body: |
            Latest JSST2026 template PDF built from `${{ github.sha }}`.
          files: JSST2026_Template.pdf
          overwrite_files: true
