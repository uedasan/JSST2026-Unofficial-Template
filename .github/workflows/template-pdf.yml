name: Build and Publish Modern Template PDF

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: template-pdf-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile modern template PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: JSST2026_Template_modern.tex
          latexmk_use_lualatex: false
          latexmk_shell_escape: false
          latexmk_rc_files: latexmkrc
          extra_system_packages: fontconfig
          work_in_root_file_dir: true

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: JSST2026_Template_modern_pdf
          path: JSST2026_Template_modern.pdf

      - name: Move latest release tag to current commit
        if: github.event_name != 'pull_request' && github.ref_name == 'main'
        run: |
          git tag -f template-pdf-latest "$GITHUB_SHA"
          git push --force origin refs/tags/template-pdf-latest

      - name: Recreate latest GitHub Release
        if: github.event_name != 'pull_request' && github.ref_name == 'main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete template-pdf-latest --yes --repo "$GITHUB_REPOSITORY" || true
          gh release create template-pdf-latest JSST2026_Template_modern.pdf \
            --repo "$GITHUB_REPOSITORY" \
            --title "Latest Modern Template PDF" \
            --notes "Latest modern JSST2026 template PDF built from \`${GITHUB_SHA}\`." \
            --latest
